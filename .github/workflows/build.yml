name: Build & Release (macOS)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-gui.txt pytest

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/admin_gui -q

      - name: Build .app + .dmg
        run: bash scripts/build_gui.sh

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradingAdmin-macOS
          path: dist/TradingAdmin-macOS.dmg
          if-no-files-found: error

      - name: Attach DMG to Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TradingAdmin-macOS.dmg
          generate_release_notes: true
